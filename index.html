<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管氏紅絨 - 專業個人履歷</title>
    <style>
        /* 基礎樣式 - 模擬 LinkedIn 的簡潔感 */
        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "Fira Sans", AppleColorEmoji, "Segoe UI Emoji", "Segoe UI Symbol", "Noto Sans CJK TC", sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3f2ef;
            color: rgba(0,0,0,0.9);
            line-height: 1.5;
        }

        .container {
            max-width: 1128px;
            margin: 0 auto;
            padding: 20px 0;
        }

        .card {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.08);
            margin-bottom: 24px;
            overflow: hidden;
        }

        .header-card {
            position: relative;
        }

        .cover-photo {
            height: 196px;
            background-color: #a0b4b7;
            background-image: linear-gradient(135deg, #a0b4b7 0%, #d3e1e1 100%);
        }

        .profile-photo-container {
            position: absolute;
            top: 110px;
            left: 24px;
        }

        .profile-photo {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.1);
            object-fit: cover;
        }

        .header-info {
            padding: 90px 24px 24px 24px;
        }

        .header-info h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 4px 0;
        }

        .header-info p.headline {
            font-size: 16px;
            font-weight: 400;
            color: rgba(0,0,0,0.9);
            margin: 0 0 8px 0;
        }

        .header-info p.location-connections {
            font-size: 14px;
            color: rgba(0,0,0,0.6);
            margin: 0;
        }

        .content-card {
            padding: 24px;
        }

        .content-card h2 {
            font-size: 20px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 16px;
        }

        .content-card p {
            margin: 0 0 16px 0;
            font-size: 14px;
        }

        .experience-item, .education-item {
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
        }

        .item-logo {
            width: 48px;
            height: 48px;
            background-color: #eee;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #aaa;
            border-radius: 4px;
        }

        .item-details h3 {
            font-size: 16px;
            font-weight: 600;
            margin: 0;
        }

        .item-details p.subtitle {
            font-size: 14px;
            color: rgba(0,0,0,0.9);
            margin: 2px 0;
        }

        .item-details p.dates-location {
            font-size: 14px;
            color: rgba(0,0,0,0.6);
            margin: 0;
        }
        
        .skills-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .skills-list li {
            display: inline-block;
            background-color: #fff;
            border: 1px solid rgba(0,0,0,0.6);
            color: rgba(0,0,0,0.7);
            padding: 6px 12px;
            border-radius: 16px;
            margin-right: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
        }
    </style>
</head>
